name: coenv
version: 0.1.0
description: Kubernetes Cluster Simulator for OpenEnv RL Hackathon
tags:
  - openenv
  - kubernetes
  - simulation
entrypoint: server.app:app
inference: inference.py
endpoints:
  reset: /reset
  step: /step
  state: /state
tasks:
  - id: pod_recovery
    difficulty: easy
  - id: autoscaling
    difficulty: medium
  - id: incident
    difficulty: hard
  - id: security
    difficulty: medium
  - id: backup_recovery
    difficulty: hard
  - id: resource_optimization
    difficulty: medium
artifacts:
  action_schema: models.py
  observation_schema: models.py
  reward_schema: server/models.py